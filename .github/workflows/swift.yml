name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
    - uses: actions/checkout@v4
    - uses: swift-actions/setup-swift@v3
      with:
        swift-version: "6.3"
    - name: Build
      run: swift build
    - name: Run tests
      run: swift test
